<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Grenze+Gotisch:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1>{{ site.title | default: "Curse of Strahd" }}</h1>
      <p class="tagline">Chronicles of Barovia · Penned in shadow, 735 BC</p>
    </header>

    <main role="main">
      {{ content }}
    </main>

    <footer>
      <p>May the Morninglord's light find these pages before the Devil Strahd does.</p>
      <small>Last quill stroke: {{ site.time | date: "%B %d, %Y" }}</small>
    </footer>
  </div>
</body>
</html>
